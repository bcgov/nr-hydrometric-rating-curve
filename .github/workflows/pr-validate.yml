name: PR Validate

on:
  pull_request:
    types: [edited, opened, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-edit-${{ github.event.number }}
  cancel-in-progress: true
  
jobs:
  validate:
    name: Validate PR
    permissions:
      contents: read
      pull-requests: write
    uses: bcgov/actions/.github/workflows/.pr-validate.yml@c7300cba0d8be84ba53846568246426c42baa994 # feat/cleanup-legacy-references
    with:
      markdown_links: |
        - [Frontend](https://${{ github.event.repository.name }}-${{ github.event.number }}-frontend.apps.silver.devops.gov.bc.ca/) available

  results:
    name: Validate Results
    needs: [validate]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Workflow completed successfully!"
