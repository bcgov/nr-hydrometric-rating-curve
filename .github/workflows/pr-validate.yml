name: PR Validate

on:
  pull_request:
    types: [edited, opened, synchronize, reopened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-edit-${{ github.event.number }}
  cancel-in-progress: true
  
jobs:
  validate:
    name: Validate PR
    permissions:
      pull-requests: write
    uses: bcgov/quickstart-openshift-helpers/.github/workflows/.pr-validate.yml@a11ad3d1b9288fb40757c4314a62eb86ff227931 # v1.2.1
    with:
      markdown_links: |
        - [Frontend](https://${{ github.event.repository.name }}-${{ github.event.number }}-frontend.apps.silver.devops.gov.bc.ca/) available

  results:
    name: Validate Results
    needs: [validate]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Workflow completed successfully!"
