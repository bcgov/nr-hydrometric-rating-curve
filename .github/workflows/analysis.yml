name: Analysis

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, converted_to_draft]
  schedule:
    - cron: "0 11 * * 0" # 3 AM PST = 12 PM UDT, runs sundays
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # https://github.com/marketplace/actions/aqua-security-trivy
  trivy:
    name: Trivy Security Scan
    if: (! github.event.pull_request.draft)
    permissions:
      security-events: write
    runs-on: ubuntu-24.04
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v6
      - name: Run Trivy vulnerability scanner in repo mode
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
          scan-type: "fs"
          scanners: "vuln,secret,config"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: "trivy-results.sarif"

  tests:
    name: Django Tests
    if: (! github.event.pull_request.draft)
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    env:
      DEBUG: "False"
      ALLOWED_HOSTS: 'localhost,'
      CSRF_TRUSTED_ORIGINS: 'http://localhost,https://localhost'
      SECRET_KEY: 'temporary_debug_key'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
           python-version: "3.14"
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev
      - name: Install requirements
        run: |
            pip install . xhtml2pdf pytest-django pytest-cov
      - name: Run tests with coverage
        run: |
            pytest --cov=rctool --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: frontend/coverage.xml
            
  results:
    name: Analysis Results
    if: always()
    needs: [tests] # Restore trivy when/if it's working again
    runs-on: ubuntu-24.04
    steps:
      - if: contains(needs.*.result, 'failure')||contains(needs.*.result, 'canceled')
        run: echo "At least one job has failed." && exit 1
      - run: echo "Success!"
