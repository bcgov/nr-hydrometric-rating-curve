[pytest]
# Run from either the repo root or the frontend/ directory.
# The testpaths setting ensures pytest always looks inside frontend/.
DJANGO_SETTINGS_MODULE = rctool_project.test_settings
python_files = tests.py test_*.py
python_classes = Test* *TestCase
python_functions = test_*
testpaths = frontend
addopts = --cov=frontend/rctool --cov-report=term-missing --cov-report=xml --cov-fail-under=80
